<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>🏃 PATH</h1>
            <p class="subtitle">Generate running & cycling routes!</p>
            
            <div class="input-group">
                <label for="distance">Distance (km)</label>
                <input type="number" id="distance" placeholder="e.g., 5" min="1" max="50" value="5" step="0.5">
            </div>
            
            <div class="input-group">
                <label for="elevation">Elevation Preference</label>
                <select id="elevation">
                    <option value="flat">Flat</option>
                    <option value="hilly">Hilly</option>
                    <option value="very-hilly">Very Hilly</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="greenery">Greenery Preference</label>
                <select id="greenery">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <div class="input-group">
                <label for="network">Route Type</label>
                <select id="network">
                    <option value="bike">🚴 Bike</option>
                    <option value="walk">🚶 Run</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Starting Point</label>
                <p class="help-text">Click on the map to set your starting location</p>
                <div id="start-coords">Not set</div>
            </div>
            
            <button id="generate-btn" onclick="generateRoute()" disabled>
                Generate Route
            </button>
            
            <div id="result-info" class="result-info" style="display: none;">
                <h3>Route Details</h3>
                <p>Distance: <span id="result-distance">-</span> km</p>
                <p>Elevation Gain: <span id="result-elevation">-</span> m</p>
                <p>Elevation Loss: <span id="result-elevation-loss">-</span> m</p>
            </div>
            
            <div id="error-message" class="error" style="display: none;"></div>
        </div>
        
        <div id="map"></div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
